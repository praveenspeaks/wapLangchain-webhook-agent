# =============================================================================
# docker-compose.yml — AI Agent Webhook
#
# Services: agent + ngrok (dev tunnel)
# All data lives on your external PostgreSQL.
# =============================================================================

version: "3.9"

services:

  # ── FastAPI Agent ──────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook_agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── ngrok (LOCAL DEV ONLY) ────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: agent_ngrok
    restart: unless-stopped
    profiles:
      - dev
    depends_on:
      - agent
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: "http agent:8000 --log=stdout"
    ports:
      - "4040:4040"
